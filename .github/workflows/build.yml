name: Build LrGeniusAI Plugin and Server

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Plugin and server version (e.g., v1.0.0)'
        required: true
        type: string
      draft_release:
        description: 'Release als Draft erstellen (zum Testen, später manuell veröffentlichen)'
        required: false
        type: boolean
        default: false

jobs:
  build-and-release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            os_name: windows
            arch: x64
            python_arch: '3.12'
            miniconda_arch: ''
          - os: macos-latest
            os_name: macos
            arch: arm64
            python_arch: '3.12'
            miniconda_arch: arm64

    name: Build LrGeniusAI - ${{ matrix.os_name }}-${{ matrix.arch }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update Info.lua with version and build date
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.version }}"
          VERSION="${VERSION#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          REVISION=$(echo "$VERSION" | cut -d. -f3)
          MAJOR=${MAJOR:-0}
          MINOR=${MINOR:-0}
          REVISION=${REVISION:-0}
          BUILD_DATE=$(date +%Y%m%d)
          INFO_LUA="plugin/LrGeniusAI.lrdevplugin/Info.lua"
          sed 's/Info.MAJOR = .*/Info.MAJOR = '"$MAJOR"'/' "$INFO_LUA" > "$INFO_LUA.tmp" && mv "$INFO_LUA.tmp" "$INFO_LUA"
          sed 's/Info.MINOR = .*/Info.MINOR = '"$MINOR"'/' "$INFO_LUA" > "$INFO_LUA.tmp" && mv "$INFO_LUA.tmp" "$INFO_LUA"
          sed 's/Info.REVISION = .*/Info.REVISION = '"$REVISION"'/' "$INFO_LUA" > "$INFO_LUA.tmp" && mv "$INFO_LUA.tmp" "$INFO_LUA"
          sed 's/Info.BUILD = [0-9]*/build = '"$BUILD_DATE"'/' "$INFO_LUA" > "$INFO_LUA.tmp" && mv "$INFO_LUA.tmp" "$INFO_LUA"
          echo "Updated Info.lua: MAJOR=$MAJOR MINOR=$MINOR REVISION=$REVISION build=$BUILD_DATE"

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: geniusai_server
          environment-file: server/environment.yml
          python-version: ${{ matrix.python_arch }}
          auto-activate-base: false
          miniconda-version: latest
          architecture: ${{ matrix.miniconda_arch }}
      - name: Fix environment
        shell: bash -l {0}
        run: |
          pip uninstall -y pillow
          pip install --force-reinstall --no-cache-dir pillow

      - name: Build geniusai-server
        shell: bash -l {0}
        working-directory: server
        env:
          KMP_DUPLICATE_LIB_OK: 'TRUE'
        run: pyinstaller geniusai_server.spec --noconfirm
          
      - name: Prepare plugin files
        shell: bash
        run: |
          BUILD_DIR="build"
          PLUGIN_DIR="$BUILD_DIR/LrGeniusAI.lrplugin"
          
          mkdir -p $PLUGIN_DIR
          
          echo "Copying server and model files..."
          cp -r server/dist/* $BUILD_DIR/
          
          echo "Copying plugin files..."
          cp plugin/LrGeniusAI.lrdevplugin/*.lua $PLUGIN_DIR/
          cp plugin/LrGeniusAI.lrdevplugin/TranslatedStrings_*.txt $PLUGIN_DIR/

          if [ "${{ matrix.os_name }}" == "macos" ]; then
            if [ -f "$BUILD_DIR/lrgenius-server/lrgenius-server" ]; then
              echo "Setting executable permissions for macOS server binary..."
              chmod +x $BUILD_DIR/lrgenius-server/lrgenius-server
            fi
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lrgenius-ai-${{ matrix.os_name }}-${{ matrix.arch }}
          path: build/
          retention-days: 1
          
  create-release:
    needs: [build-and-release]
    runs-on: ubuntu-latest
    name: Create Release
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Zip artifacts
        run: |
          VERSION=${{ github.event.inputs.version }}
          
          cd artifacts
          
          if [ -d "lrgenius-ai-windows-x64" ]; then
            cd lrgenius-ai-windows-x64
            zip -r ../LrGeniusAI-windows-x64-${VERSION}.zip .
            cd ..
          fi

          if [ -d "lrgenius-ai-macos-arm64" ]; then
            cd lrgenius-ai-macos-arm64
            zip -r ../LrGeniusAI-macos-arm64-${VERSION}.zip .
            cd ..
          fi
          
          cd ..

      - name: Set release metadata
        id: release-meta
        run: |
          VERSION="${{ github.event.inputs.version }}"
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          if [ "$BRANCH_NAME" = "main" ]; then
            echo "release_name=Release v${VERSION}" >> $GITHUB_OUTPUT
          else
            echo "release_name=Release v${VERSION} (${BRANCH_NAME})" >> $GITHUB_OUTPUT
          fi
          echo "branch_name=${BRANCH_NAME}" >> $GITHUB_OUTPUT

      - name: Prepare release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.event.inputs.version }}"
          TAG="v${VERSION}"
          BRANCH_NAME="${{ steps.release-meta.outputs.branch_name }}"
          # Auto-generierte Release Notes von GitHub (falls möglich)
          gh api repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name="${TAG}" \
            -q '.body' > release_notes.md 2>/dev/null || echo -n "" > release_notes.md
          # Branch-Hinweis oben einfügen (wenn nicht main)
          if [ "$BRANCH_NAME" != "main" ]; then
            { echo "**Build from branch:** \`${BRANCH_NAME}\`"; echo ""; cat release_notes.md; } > release_notes.tmp
            mv release_notes.tmp release_notes.md
          fi
          # Standard-Hinweise zu Known Issues und manuellen Schritten anhängen
          cat >> release_notes.md << 'NOTES'

          ## Known issues
          This release has issues with Windows Smartscreen and macOS Gatekeeper, which will prevent the start of the LrGenius backend. You will get an error in Lightroom that the LrGeniusAI database cannot be started.
          Which means depending on your platform there are necessary manual steps to do before the first use. Please note the pre-release tag. I'm still trying to get this as easy as possible. If you have a stable working copy of LrGeniusTagAI 1.x or LrGeniusAI 2.0 installed do not yet make the switch.

          ## Manual steps
          **macOS**
          - Open a Terminal
          - `cd <directory with contents of the downloaded zip file>`
          - `chmod +x lrgenius-server/lrgenius-server`
          - `xattr -dr com.apple.quarantine lrgenius-server`

          **Windows**
          - Open Explorer go to folder where you extracted the zip file.
          - Go to the lrgenius-server sub directory.
          - Double-click lrgenius-server.exe
          - A Windows Smartscreen warning will appear.
          - Click More -> Run anyway
          NOTES

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: ${{ steps.release-meta.outputs.release_name }}
          body_path: release_notes.md
          files: |
            artifacts/LrGeniusAI-windows-x64-${{ github.event.inputs.version }}.zip
            artifacts/LrGeniusAI-macos-arm64-${{ github.event.inputs.version }}.zip
          draft: ${{ github.event.inputs.draft_release == 'true' }}
          prerelease: ${{ github.ref != 'refs/heads/main' }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
