name: Build LrGeniusAI Plugin and Server

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    # Trigger only for version tags and ensure tagged commit is on main.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            os_name: windows
            arch: x64
            python_arch: '3.12'
            miniconda_arch: ''
          - os: macos-latest
            os_name: macos
            arch: arm64
            python_arch: '3.12'
            miniconda_arch: arm64

    name: Build LrGeniusAI - ${{ matrix.os_name }}-${{ matrix.arch }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure tag commit is on main
        shell: bash
        run: |
          TAG_SHA="${GITHUB_SHA}"
          git fetch origin main
          if git branch -r --contains "$TAG_SHA" | grep -q "origin/main"; then
            echo "Tag commit is contained in origin/main."
          else
            echo "Error: Tag commit is not contained in origin/main."
            exit 1
          fi

      - name: Update Info.lua with version and build date
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          REVISION=$(echo "$VERSION" | cut -d. -f3)
          MAJOR=${MAJOR:-0}
          MINOR=${MINOR:-0}
          REVISION=${REVISION:-0}
          BUILD_DATE=$(date +%Y%m%d)
          INFO_LUA="plugin/LrGeniusAI.lrdevplugin/Info.lua"
          sed 's/Info.MAJOR = .*/Info.MAJOR = '"$MAJOR"'/' "$INFO_LUA" > "$INFO_LUA.tmp" && mv "$INFO_LUA.tmp" "$INFO_LUA"
          sed 's/Info.MINOR = .*/Info.MINOR = '"$MINOR"'/' "$INFO_LUA" > "$INFO_LUA.tmp" && mv "$INFO_LUA.tmp" "$INFO_LUA"
          sed 's/Info.REVISION = .*/Info.REVISION = '"$REVISION"'/' "$INFO_LUA" > "$INFO_LUA.tmp" && mv "$INFO_LUA.tmp" "$INFO_LUA"
          sed 's/Info.BUILD = [0-9]*/build = '"$BUILD_DATE"'/' "$INFO_LUA" > "$INFO_LUA.tmp" && mv "$INFO_LUA.tmp" "$INFO_LUA"
          echo "Updated Info.lua: MAJOR=$MAJOR MINOR=$MINOR REVISION=$REVISION build=$BUILD_DATE"

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: geniusai_server
          environment-file: server/environment.yml
          python-version: ${{ matrix.python_arch }}
          auto-activate-base: false
          miniconda-version: latest
          architecture: ${{ matrix.miniconda_arch }}
      - name: Fix environment
        shell: bash -l {0}
        run: |
          pip uninstall -y pillow
          pip install --force-reinstall --no-cache-dir pillow

      - name: Build geniusai-server
        shell: bash -l {0}
        working-directory: server
        env:
          KMP_DUPLICATE_LIB_OK: 'TRUE'
        run: pyinstaller geniusai_server.spec --noconfirm
          
      - name: Prepare plugin files
        shell: bash
        run: |
          BUILD_DIR="build"
          PLUGIN_DIR="$BUILD_DIR/LrGeniusAI.lrplugin"
          
          mkdir -p $PLUGIN_DIR
          
          echo "Copying server and model files..."
          cp -r server/dist/* $BUILD_DIR/
          
          echo "Copying plugin files..."
          cp plugin/LrGeniusAI.lrdevplugin/*.lua $PLUGIN_DIR/
          cp plugin/LrGeniusAI.lrdevplugin/TranslatedStrings_*.txt $PLUGIN_DIR/

          if [ "${{ matrix.os_name }}" == "macos" ]; then
            if [ -f "$BUILD_DIR/lrgenius-server/lrgenius-server" ]; then
              echo "Setting executable permissions for macOS server binary..."
              chmod +x $BUILD_DIR/lrgenius-server/lrgenius-server
            fi
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lrgenius-ai-${{ matrix.os_name }}-${{ matrix.arch }}
          path: build/
          retention-days: 1

  build-docker-images:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: x64
            docker_platform: linux/amd64
          - arch: aarch64
            docker_platform: linux/arm64

    name: Build Docker Image - ${{ matrix.arch }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image archive
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          platforms: ${{ matrix.docker_platform }}
          tags: lrgeniusai-server:${{ github.ref_name }}-${{ matrix.arch }}
          outputs: type=docker,dest=/tmp/lrgeniusai-server-${{ matrix.arch }}.tar
          cache-from: type=gha,scope=lrgeniusai-server-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=lrgeniusai-server-${{ matrix.arch }}
          provenance: false
          sbom: false

      - name: Compress Docker image archive
        shell: bash
        run: |
          mkdir -p docker-artifacts
          gzip -c /tmp/lrgeniusai-server-${{ matrix.arch }}.tar > docker-artifacts/lrgeniusai-server-linux-${{ matrix.arch }}-${{ github.ref_name }}.tar.gz

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: lrgeniusai-server-docker-linux-${{ matrix.arch }}
          path: docker-artifacts/lrgeniusai-server-linux-${{ matrix.arch }}-${{ github.ref_name }}.tar.gz
          retention-days: 1
          
  create-release:
    needs: [build-and-release, build-docker-images]
    runs-on: ubuntu-latest
    name: Create Release
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Zip artifacts
        run: |
          VERSION=${{ github.ref_name }}
          
          cd artifacts
          
          if [ -d "lrgenius-ai-windows-x64" ]; then
            cd lrgenius-ai-windows-x64
            zip -r ../LrGeniusAI-windows-x64-${VERSION}.zip .
            cd ..
          fi

          if [ -d "lrgenius-ai-macos-arm64" ]; then
            cd lrgenius-ai-macos-arm64
            zip -r ../LrGeniusAI-macos-arm64-${VERSION}.zip .
            cd ..
          fi
          
          cd ..

      - name: Set release metadata
        id: release-meta
        run: |
          VERSION="${{ github.ref_name }}"
          echo "release_name=Release ${VERSION}" >> $GITHUB_OUTPUT

      - name: Prepare release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"
          TAG="${VERSION}"
          # Auto-generierte Release Notes von GitHub (falls möglich)
          gh api repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name="${TAG}" \
            -q '.body' > release_notes.md 2>/dev/null || echo -n "" > release_notes.md
          # Standard-Hinweise zu Known Issues und manuellen Schritten anhängen
          cat >> release_notes.md << 'NOTES'

          ## Known issues
          This release has issues with Windows Smartscreen and macOS Gatekeeper, which will prevent the start of the LrGenius backend. You will get an error in Lightroom that the LrGeniusAI database cannot be started.
          Which means depending on your platform there are necessary manual steps to do before the first use. Please note the pre-release tag. I'm still trying to get this as easy as possible. If you have a stable working copy of LrGeniusTagAI 1.x or LrGeniusAI 2.0 installed do not yet make the switch.

          ## Manual steps
          **macOS**
          - Open a Terminal
          - `cd <directory with contents of the downloaded zip file>`
          - `chmod +x lrgenius-server/lrgenius-server`
          - `xattr -dr com.apple.quarantine lrgenius-server`

          **Windows**
          - Open Explorer go to folder where you extracted the zip file.
          - Go to the lrgenius-server sub directory.
          - Double-click lrgenius-server.exe
          - A Windows Smartscreen warning will appear.
          - Click More -> Run anyway

          ## Docker images
          - This release also contains Docker image archives for `linux/x64` and `linux/aarch64`.
          - Load an image with `gunzip -c <docker-archive>.tar.gz | docker load`
          NOTES

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ steps.release-meta.outputs.release_name }}
          body_path: release_notes.md
          files: |
            artifacts/LrGeniusAI-windows-x64-${{ github.ref_name }}.zip
            artifacts/LrGeniusAI-macos-arm64-${{ github.ref_name }}.zip
            artifacts/lrgeniusai-server-docker-linux-x64/lrgeniusai-server-linux-x64-${{ github.ref_name }}.tar.gz
            artifacts/lrgeniusai-server-docker-linux-aarch64/lrgeniusai-server-linux-aarch64-${{ github.ref_name }}.tar.gz
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
