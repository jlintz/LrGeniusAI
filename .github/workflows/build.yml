name: Build LrGeniusAI Plugin and Server

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    # Trigger only for version tags and ensure tagged commit is on main.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            os_name: windows
            arch: x64
          - os: macos-latest
            os_name: macos
            arch: arm64

    name: Build LrGeniusAI - ${{ matrix.os_name }}-${{ matrix.arch }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Ensure tag commit is on main
        shell: bash
        run: |
          TAG_SHA="${GITHUB_SHA}"
          git fetch origin main
          if git branch -r --contains "$TAG_SHA" | grep -q "origin/main"; then
            echo "Tag commit is contained in origin/main."
          else
            echo "Error: Tag commit is not contained in origin/main."
            exit 1
          fi

      - name: Update Info.lua with version and build date
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          REVISION=$(echo "$VERSION" | cut -d. -f3)
          MAJOR=${MAJOR:-0}
          MINOR=${MINOR:-0}
          REVISION=${REVISION:-0}
          BUILD_DATE=$(date +%Y%m%d)
          INFO_LUA="plugin/LrGeniusAI.lrdevplugin/Info.lua"
          sed 's/Info.MAJOR = .*/Info.MAJOR = '"$MAJOR"'/' "$INFO_LUA" > "$INFO_LUA.tmp" && mv "$INFO_LUA.tmp" "$INFO_LUA"
          sed 's/Info.MINOR = .*/Info.MINOR = '"$MINOR"'/' "$INFO_LUA" > "$INFO_LUA.tmp" && mv "$INFO_LUA.tmp" "$INFO_LUA"
          sed 's/Info.REVISION = .*/Info.REVISION = '"$REVISION"'/' "$INFO_LUA" > "$INFO_LUA.tmp" && mv "$INFO_LUA.tmp" "$INFO_LUA"
          sed 's/Info.BUILD = [0-9]*/build = '"$BUILD_DATE"'/' "$INFO_LUA" > "$INFO_LUA.tmp" && mv "$INFO_LUA.tmp" "$INFO_LUA"
          echo "Updated Info.lua: MAJOR=$MAJOR MINOR=$MINOR REVISION=$REVISION build=$BUILD_DATE"

      - name: Update backend version info from tag
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          BUILD_DATE=$(date +%Y%m%d)
          VERSION_FILE="server/src/version_info.py"
          cat > "$VERSION_FILE" <<EOF
          BACKEND_VERSION = "${VERSION}"
          BACKEND_RELEASE_TAG = "v${VERSION}"
          BACKEND_BUILD = ${BUILD_DATE}
          EOF
          echo "Updated backend version info: version=${VERSION} build=${BUILD_DATE}"

      - name: Setup micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: geniusai_server
          environment-file: server/environment.yml
          cache-environment: true
          init-shell: bash

      - name: Build micromamba backend runtime
        shell: bash -el {0}
        run: |
          set -euo pipefail
          BUILD_DIR="build"
          SERVER_DIR="$BUILD_DIR/lrgenius-server"
          SERVER_APP_DIR="$SERVER_DIR/app"
          SERVER_ENV_DIR="$SERVER_DIR/env"
          mkdir -p "$SERVER_APP_DIR"

          # Pack the CI env into a relocatable runtime env.
          micromamba install -y -n geniusai_server conda-pack
          micromamba run -n geniusai_server conda-pack -p "$MAMBA_ROOT_PREFIX/envs/geniusai_server" -o "$SERVER_DIR/env.tar.gz"
          mkdir -p "$SERVER_ENV_DIR"
          tar -xzf "$SERVER_DIR/env.tar.gz" -C "$SERVER_ENV_DIR"
          rm -f "$SERVER_DIR/env.tar.gz"

          echo "Copying backend source files..."
          cp -r server/src "$SERVER_APP_DIR/"
          cp -r server/open_clip "$SERVER_APP_DIR/"

          if [ "${{ matrix.os_name }}" == "windows" ]; then
            {
              echo '@echo off'
              echo 'setlocal'
              echo 'set "SCRIPT_DIR=%~dp0"'
              echo 'set "KMP_DUPLICATE_LIB_OK=TRUE"'
              echo 'set "PYTHONPATH=%SCRIPT_DIR%app;%PYTHONPATH%"'
              echo 'if not exist "%SCRIPT_DIR%.env_unpacked" ('
              echo '  call "%SCRIPT_DIR%env\Scripts\conda-unpack.exe" >nul 2>&1'
              echo '  type nul > "%SCRIPT_DIR%.env_unpacked"'
              echo ')'
              echo 'call "%SCRIPT_DIR%env\python.exe" "%SCRIPT_DIR%app\src\geniusai_server.py" %*'
            } > "$SERVER_DIR/lrgenius-server.cmd"
          else
            {
              echo '#!/usr/bin/env bash'
              echo 'set -euo pipefail'
              echo 'SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"'
              echo 'export KMP_DUPLICATE_LIB_OK=TRUE'
              echo 'export PYTHONPATH="$SCRIPT_DIR/app:${PYTHONPATH:-}"'
              echo 'if [ ! -f "$SCRIPT_DIR/.env_unpacked" ] && [ -x "$SCRIPT_DIR/env/bin/conda-unpack" ]; then'
              echo '  "$SCRIPT_DIR/env/bin/conda-unpack" >/dev/null 2>&1 || true'
              echo '  touch "$SCRIPT_DIR/.env_unpacked"'
              echo 'fi'
              echo 'exec "$SCRIPT_DIR/env/bin/python" "$SCRIPT_DIR/app/src/geniusai_server.py" "$@"'
            } > "$SERVER_DIR/lrgenius-server"
            chmod +x "$SERVER_DIR/lrgenius-server"
          fi
          
      - name: Prepare plugin files
        shell: bash
        run: |
          BUILD_DIR="build"
          PLUGIN_DIR="$BUILD_DIR/LrGeniusAI.lrplugin"
          
          mkdir -p $PLUGIN_DIR
          
          echo "Copying plugin files..."
          cp plugin/LrGeniusAI.lrdevplugin/*.lua $PLUGIN_DIR/
          cp plugin/LrGeniusAI.lrdevplugin/TranslatedStrings_*.txt $PLUGIN_DIR/

          if [ "${{ matrix.os_name }}" == "macos" ]; then
            if [ -f "$BUILD_DIR/lrgenius-server/lrgenius-server" ]; then
              echo "Setting executable permissions for macOS server binary..."
              chmod +x $BUILD_DIR/lrgenius-server/lrgenius-server
            fi
          fi

      - name: Smoke test packaged backend and log cold start
        shell: bash -el {0}
        run: |
          set -euo pipefail
          DB_DIR="$RUNNER_TEMP/lrgenius-smoke-db"
          DB_PATH="$DB_DIR/lrgenius.db"
          mkdir -p "$DB_DIR"
          URL="http://127.0.0.1:19819/ping"
          START_TS=$(python -c "import time; print(time.time())")

          if [ "${{ matrix.os_name }}" == "windows" ]; then
            DB_PATH_WIN=$(cygpath -w "$DB_PATH")
            cmd.exe /c "start \"\" /b \"${GITHUB_WORKSPACE}\\build\\lrgenius-server\\lrgenius-server.cmd\" --db-path \"${DB_PATH_WIN}\""
          else
            "build/lrgenius-server/lrgenius-server" --db-path "$DB_PATH" >/dev/null 2>&1 &
          fi

          READY=0
          for i in $(seq 1 240); do
            if curl -sf "$URL" | grep -q "pong"; then
              READY=1
              break
            fi
            sleep 0.5
          done

          if [ "$READY" -ne 1 ]; then
            echo "Backend smoke test failed: /ping did not return pong in time."
            exit 1
          fi

          END_TS=$(python -c "import time; print(time.time())")
          COLD_START_SECONDS=$(python -c "import sys; print(f'{float(sys.argv[2]) - float(sys.argv[1]):.2f}')" "$START_TS" "$END_TS")
          echo "Measured cold start to /ping: ${COLD_START_SECONDS}s"

          curl -sf -X POST "http://127.0.0.1:19819/shutdown" || true

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: lrgenius-ai-${{ matrix.os_name }}-${{ matrix.arch }}
          path: build/
          retention-days: 1

  build-plugin-only:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    name: Build Plugin Only

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Ensure tag commit is on main
        shell: bash
        run: |
          TAG_SHA="${GITHUB_SHA}"
          git fetch origin main
          if git branch -r --contains "$TAG_SHA" | grep -q "origin/main"; then
            echo "Tag commit is contained in origin/main."
          else
            echo "Error: Tag commit is not contained in origin/main."
            exit 1
          fi

      - name: Update Info.lua with version and build date
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          REVISION=$(echo "$VERSION" | cut -d. -f3)
          MAJOR=${MAJOR:-0}
          MINOR=${MINOR:-0}
          REVISION=${REVISION:-0}
          BUILD_DATE=$(date +%Y%m%d)
          INFO_LUA="plugin/LrGeniusAI.lrdevplugin/Info.lua"
          sed 's/Info.MAJOR = .*/Info.MAJOR = '"$MAJOR"'/' "$INFO_LUA" > "$INFO_LUA.tmp" && mv "$INFO_LUA.tmp" "$INFO_LUA"
          sed 's/Info.MINOR = .*/Info.MINOR = '"$MINOR"'/' "$INFO_LUA" > "$INFO_LUA.tmp" && mv "$INFO_LUA.tmp" "$INFO_LUA"
          sed 's/Info.REVISION = .*/Info.REVISION = '"$REVISION"'/' "$INFO_LUA" > "$INFO_LUA.tmp" && mv "$INFO_LUA.tmp" "$INFO_LUA"
          sed 's/Info.BUILD = [0-9]*/build = '"$BUILD_DATE"'/' "$INFO_LUA" > "$INFO_LUA.tmp" && mv "$INFO_LUA.tmp" "$INFO_LUA"
          echo "Updated Info.lua: MAJOR=$MAJOR MINOR=$MINOR REVISION=$REVISION build=$BUILD_DATE"

      - name: Prepare plugin-only files
        shell: bash
        run: |
          BUILD_DIR="build-plugin-only"
          mkdir -p "$BUILD_DIR"
          cp -r plugin/LrGeniusAI.lrdevplugin "$BUILD_DIR/"

      - name: Upload plugin-only artifact
        uses: actions/upload-artifact@v6
        with:
          name: lrgenius-ai-plugin-docker-backend
          path: build-plugin-only/
          retention-days: 1

  build-docker-images:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - arch: x64
            docker_platform: linux/amd64
          - arch: aarch64
            docker_platform: linux/arm64

    name: Build Docker Image - ${{ matrix.arch }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Prepare image name
        id: image-name
        shell: bash
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "registry_image=ghcr.io/${OWNER_LC}/lrgeniusai" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          platforms: ${{ matrix.docker_platform }}
          push: true
          tags: ${{ steps.image-name.outputs.registry_image }}:${{ github.ref_name }}-${{ matrix.arch }}
          cache-from: type=gha,scope=lrgeniusai-server-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=lrgeniusai-server-${{ matrix.arch }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ github.ref_name }}
          provenance: false
          sbom: false
          
  create-release:
    needs: [build-and-release, build-plugin-only]
    runs-on: ubuntu-latest
    name: Create Release
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: lrgenius-ai-*
          path: artifacts
      
      - name: Zip artifacts
        run: |
          VERSION=${{ github.ref_name }}
          
          cd artifacts
          
          if [ -d "lrgenius-ai-windows-x64" ]; then
            cd lrgenius-ai-windows-x64
            zip -r ../LrGeniusAI-windows-x64-${VERSION}.zip .
            cd ..
          fi

          if [ -d "lrgenius-ai-macos-arm64" ]; then
            cd lrgenius-ai-macos-arm64
            zip -r ../LrGeniusAI-macos-arm64-${VERSION}.zip .
            cd ..
          fi

          if [ -d "lrgenius-ai-plugin-docker-backend" ]; then
            cd lrgenius-ai-plugin-docker-backend
            zip -r ../LrGeniusAI-plugin-docker-backend-${VERSION}.zip .
            cd ..
          fi
          
          cd ..

      - name: Set release metadata
        id: release-meta
        run: |
          VERSION="${{ github.ref_name }}"
          echo "release_name=Release ${VERSION}" >> $GITHUB_OUTPUT

      - name: Prepare release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"
          TAG="${VERSION}"
          # Auto-generierte Release Notes von GitHub (falls möglich)
          gh api repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name="${TAG}" \
            -q '.body' > release_notes.md 2>/dev/null || echo -n "" > release_notes.md
          # Hinweise zu Backend-Startverhalten und Docker-Asset anhängen
          cat >> release_notes.md << 'NOTES'

          ## Desktop backend startup
          - The bundled micromamba-based backend starts automatically from Lightroom.
          - The previous SmartScreen/Gatekeeper manual unblock steps are no longer required for this package.
          - Optional manual troubleshooting start:
            - Windows: `lrgenius-server/lrgenius-server.cmd`
            - macOS: `lrgenius-server/lrgenius-server`

          ## Docker backend
          - Users running the backend via Docker can use the `LrGeniusAI-plugin-docker-backend-<version>.zip` asset.
          NOTES

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ steps.release-meta.outputs.release_name }}
          body_path: release_notes.md
          files: |
            artifacts/LrGeniusAI-windows-x64-${{ github.ref_name }}.zip
            artifacts/LrGeniusAI-macos-arm64-${{ github.ref_name }}.zip
            artifacts/LrGeniusAI-plugin-docker-backend-${{ github.ref_name }}.zip
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
