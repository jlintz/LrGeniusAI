name: Publish Wiki

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "README.md"
      - "plugin/README.md"
      - "server/README.md"
      - "scripts/build-wiki-pages.sh"
      - "scripts/publish-wiki.sh"
      - ".github/workflows/publish-wiki.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure scripts are executable
        run: chmod +x scripts/publish-wiki.sh scripts/build-wiki-pages.sh

      - name: Publish docs to GitHub Wiki
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: bash scripts/publish-wiki.sh
