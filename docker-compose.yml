# geniusai-server with Docker Compose
# Start: docker compose up -d
# Stop:  docker compose down
# Logs:  docker compose logs -f geniusai-server

services:
  geniusai-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: geniusai-server:latest
    container_name: geniusai-server
    restart: unless-stopped
    ports:
      - "19819:19819"
    volumes:
      # Persistent backend data and logs
      - ./data:/data
      # Persistent model caches (OpenCLIP / Hugging Face / InsightFace)
      - ./models:/models
      # Persistent Google Cloud CLI config + ADC login
      - ./gcloud:/root/.config/gcloud
    environment:
      - GENIUSAI_HOST=0.0.0.0
      - GENIUSAI_PORT=19819
      - CLOUDSDK_CONFIG=/root/.config/gcloud
